<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My App</title>
<script src="./pocketbase.umd.js"></script>
<style>
  :root{--bg:#0a0c10;--panel:#11141b;--line:#1f2530;--text:#ecf0f6;--muted:#8a93a5;--accent:#3499cc}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--text);font:15px/1.55 -apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;display:grid;place-items:center;padding:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px;max-width:440px}
  h1{font-size:20px;letter-spacing:-.02em;margin-bottom:8px}
  p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:10px}
  code{background:#171b24;border:1px solid var(--line);padding:2px 6px;border-radius:5px;font-size:12.5px}
  .ok{color:#3fcf8e}
</style>
</head>
<body>
  <div class="card">
    <h1>It works.</h1>
    <p>API status: <span id="health">checking…</span></p>
    <p>This page is served by your app. The backend — database, auth, files, realtime — is at <code>/api</code>, and your data admin is at <code>/_/</code>.</p>
    <p>Replace this file, push to your repo, and the platform redeploys automatically.</p>
  </div>
<script>
  const pb = new PocketBase('/');
  pb.health.check()
    .then(() => document.getElementById('health').innerHTML = '<span class="ok">connected ✓</span>')
    .catch(() => document.getElementById('health').textContent = 'unreachable');
</script>
</body>
</html>
